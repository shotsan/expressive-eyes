<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Every Style · Every Emotion</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }
      body {
        background: radial-gradient(circle at 50% 0%, #141a2b, #06070b 70%);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        color: #d6dcea; padding: 24px 18px 60px;
      }
      h1 { font-size: 21px; font-weight: 650; text-align: center; margin: 0 0 4px; }
      .sub { text-align: center; opacity: .55; font-size: 13px; margin-bottom: 18px; }
      .bar {
        position: sticky; top: 0; z-index: 5; display: flex; flex-wrap: wrap; gap: 8px;
        justify-content: center; padding: 12px; margin: 0 auto 22px; max-width: 900px;
        background: rgba(10,13,22,.82); backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,.08); border-radius: 16px;
      }
      button {
        font: inherit; font-size: 13px; color: #dfe6f4;
        background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.12);
        border-radius: 999px; padding: 7px 14px; cursor: pointer; transition: .15s;
      }
      button:hover { background: rgba(120,180,255,.18); border-color: rgba(120,180,255,.45); }
      button.active { background: rgba(120,180,255,.32); border-color: rgba(120,180,255,.7); color: #fff; }
      .grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; max-width: 1080px; margin: 0 auto; }
      @media (max-width: 980px){ .grid{ grid-template-columns: repeat(3,1fr);} }
      @media (max-width: 720px){ .grid{ grid-template-columns: repeat(2,1fr);} }
      .card { background: rgba(255,255,255,.035); border: 1px solid rgba(255,255,255,.08); border-radius: 16px; padding: 8px 8px 10px; }
      .card canvas { width: 100%; height: 150px; display: block; }
      .card .name { text-align: center; font-size: 12px; opacity: .65; margin-top: 4px; }
    </style>
  </head>
  <body>
    <h1>Every style · every emotion</h1>
    <div class="sub">One emotion engine drives every design. Pick a feeling — they all express it. Move your cursor, or turn on the camera and they follow your face.</div>
    <div class="bar" id="bar"></div>
    <div class="grid" id="grid"></div>

    <div id="cam">
      <button id="camBtn">📷 Follow my face</button>
      <video id="video" playsinline muted></video>
      <div id="camMsg"></div>
    </div>

    <style>
      #cam { position: fixed; bottom: 16px; right: 16px; z-index: 6; display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
      #video { width: 160px; height: 120px; border-radius: 12px; object-fit: cover; transform: scaleX(-1); border: 1px solid rgba(255,255,255,.15); display: none; background: #000; }
      #video.on { display: block; }
      #camMsg { font-size: 11px; opacity: .6; max-width: 180px; text-align: right; }
    </style>
    <script type="module" src="/demo/main.ts"></script>
  </body>
</html>
